version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: temp-mail-db
    environment:
      POSTGRES_USER: temp_mail_user
      POSTGRES_PASSWORD: temp_mail_password
      POSTGRES_DB: temp_mail_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temp_mail_user -d temp_mail_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
