services:
  # SMTP Server (Mail Receiver)
  smtp:
    build:
      context: .
      dockerfile: Dockerfile.smtp
    container_name: tempmail-smtp
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "25:25"
    cap_add:
      - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 25 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # HTTP API Server
  http:
    build:
      context: .
      dockerfile: Dockerfile.http
    container_name: tempmail-http
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
