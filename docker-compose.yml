services:
  # SMTP Server (Mail Receiver)
  smtp:
    build:
      context: .
      dockerfile: Dockerfile.smtp
    container_name: tempmail-smtp
    restart: unless-stopped
    environment:
      DB_HOST: YOUR_DB_HOST
      DB_USER: neondb_owner
      DB_PASSWORD: YOUR_DB_PASSWORD
      DB_NAME: neondb
      DB_PORT: "5432"
      DB_SSLMODE: require
      MAIL_DOMAIN: xelio.me
      RUST_LOG: info
    ports:
      - "25:25"
    cap_add:
      - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 25 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # HTTP API Server
  http:
    build:
      context: .
      dockerfile: Dockerfile.http
    container_name: tempmail-http
    restart: unless-stopped
    environment:
      DB_HOST: YOUR_DB_HOST
      DB_USER: neondb_owner
      DB_PASSWORD: YOUR_DB_PASSWORD
      DB_NAME: neondb
      DB_PORT: "5432"
      DB_SSLMODE: require
      MAIL_DOMAIN: xelio.me
      RUST_LOG: info
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
