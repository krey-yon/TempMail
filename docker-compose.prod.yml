# Production Docker Compose for Coolify
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Required environment variables:
#   - DB_HOST: Neon database host
#   - DB_USER: Neon database user
#   - DB_PASSWORD: Neon database password
#   - DB_NAME: Neon database name

services:
  # HTTP API Server
  http:
    build:
      context: .
      dockerfile: Dockerfile.http
    container_name: tempmail-http
    restart: always
    environment:
      - DB_HOST=${DB_HOST:?DB_HOST required}
      - DB_USER=${DB_USER:?DB_USER required}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD required}
      - DB_NAME=${DB_NAME:?DB_NAME required}
      - DB_PORT=${DB_PORT:-5432}
      - DB_SSLMODE=${DB_SSLMODE:-require}
      - RUST_LOG=${RUST_LOG:-info}
    ports:
      - "${HTTP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # SMTP Server (Mail Receiver)
  smtp:
    build:
      context: .
      dockerfile: Dockerfile.smtp
    container_name: tempmail-smtp
    restart: always
    environment:
      - DB_HOST=${DB_HOST:?DB_HOST required}
      - DB_USER=${DB_USER:?DB_USER required}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD required}
      - DB_NAME=${DB_NAME:?DB_NAME required}
      - DB_PORT=${DB_PORT:-5432}
      - DB_SSLMODE=${DB_SSLMODE:-require}
      - MAIL_DOMAIN=${MAIL_DOMAIN:-mail.kreyon.in}
      - SMTP_PORT=${SMTP_PORT:-25}
      - RUST_LOG=${RUST_LOG:-info}
    ports:
      - "${SMTP_PORT:-25}:25"
    cap_add:
      - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 25 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
