# Single container deployment (SMTP + HTTP in one container)
# Use this for simple Coolify deployments

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: tempmail-db
    restart: always
    environment:
      POSTGRES_USER: tempmail
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tempmail_secret}
      POSTGRES_DB: tempmail
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tempmail -d tempmail"]
      interval: 5s
      timeout: 5s
      retries: 5

  # All-in-One TempMail Container (SMTP + HTTP)
  tempmail:
    build:
      context: .
      dockerfile: Dockerfile.single
    container_name: tempmail
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: tempmail
      DB_PASSWORD: ${DB_PASSWORD:-tempmail_secret}
      DB_NAME: tempmail
      DB_PORT: "5432"
      DB_SSLMODE: disable
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "25:25"
      - "3000:3000"
    cap_add:
      - NET_BIND_SERVICE

volumes:
  postgres_data:
